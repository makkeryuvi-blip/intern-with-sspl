<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping</title>
    <link rel="stylesheet" href="online.css">
</head>
<body>

    <h1>My Shopping Store</h1>

    <div class="container">

        <div class="card">
            <img src="manglsutr.jpeg">
            <h2>Antique Gold Jewellery</h2>
            <p>₹500</p>
            <p>(42 review)</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="earring.jpeg">
            <h2>Stunning Jhumkas</h2>
            <p>₹999</p>
            <p>(12 review)</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="necklace.jpeg">
            <h2>Elegant Necklace</h2>
            <p>₹3,000</p>
            <p>(14 review)</p>
            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
